
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap');

:root{
  --bg-main:#eef6f4;
  --bg-surface:#ffffff;
  --bg-muted:#f4faf8;
  --text-primary:#112721;
  --text-secondary:#4f675f;
  --text-tertiary:#7b8f88;
  --border:#d4e4df;
  --border-strong:#9fbeb6;
  --accent:#0f766e;
  --shadow:0 24px 48px -32px rgba(20,48,41,.42);
}

*{box-sizing:border-box;margin:0;padding:0}

.root{
  position:relative;
  max-width:1200px;
  margin:14px auto;
  padding:1.25rem;
  border-radius:28px;
  background:linear-gradient(140deg,#f8fcfb 0%,var(--bg-main) 100%);
  border:1px solid #d8e8e3;
  box-shadow:var(--shadow);
  font-family:"DM Sans","Segoe UI",sans-serif;
  color:var(--text-primary);
  overflow:hidden;
}
.root::before,.root::after{
  content:"";
  position:absolute;
  border-radius:50%;
  pointer-events:none;
}
.root::before{
  width:260px;
  height:260px;
  background:radial-gradient(circle at center,rgba(15,118,110,.19) 0%,rgba(15,118,110,0) 70%);
  top:-90px;
  right:-80px;
}
.root::after{
  width:240px;
  height:240px;
  background:radial-gradient(circle at center,rgba(249,115,22,.16) 0%,rgba(249,115,22,0) 72%);
  left:-90px;
  bottom:-120px;
}

.header{
  position:relative;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:12px;
  padding:16px 18px;
  margin-bottom:1rem;
  border:1px solid var(--border);
  border-radius:20px;
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(6px);
  animation:rise .45s ease both;
}
.header h1{
  font-family:"Space Grotesk","Trebuchet MS",sans-serif;
  font-size:clamp(1.35rem,2.1vw,2rem);
  font-weight:700;
  color:var(--text-primary);
  letter-spacing:-.55px;
}
.header p{
  font-size:.95rem;
  color:var(--text-secondary);
  margin-top:6px;
}
.header-tag{
  border:1px solid #c7ddd8;
  background:linear-gradient(120deg,#effaf7 0%,#f9f3ea 100%);
  border-radius:999px;
  padding:7px 12px;
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#20564f;
  white-space:nowrap;
}

.stats-row{
  display:grid;
  grid-template-columns:repeat(4,minmax(120px,1fr));
  gap:10px;
  margin-bottom:1rem;
  animation:rise .5s .08s ease both;
}
.stat{
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px 14px;
  min-height:76px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.stat::before{
  content:"";
  position:absolute;
  inset:0 auto auto 0;
  width:100%;
  height:3px;
  background:linear-gradient(90deg,var(--accent) 0%,#f97316 100%);
  opacity:.45;
}
.stat-num{
  font-size:1.5rem;
  font-weight:700;
  line-height:1.1;
  color:var(--text-primary);
}
.stat-label{
  font-size:.72rem;
  color:var(--text-tertiary);
  margin-top:2px;
  text-transform:uppercase;
  letter-spacing:.07em;
}

.content-layout{
  display:grid;
  grid-template-columns:minmax(280px,345px) 1fr;
  gap:12px;
  align-items:start;
}

.weeks-panel{
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:12px;
  animation:rise .5s .14s ease both;
}
.panel-head{
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:.09em;
  color:var(--text-tertiary);
  margin:2px 3px 10px;
}
.weeks-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
  max-height:62vh;
  overflow:auto;
  padding-right:2px;
}
.weeks-grid::-webkit-scrollbar{width:8px}
.weeks-grid::-webkit-scrollbar-thumb{
  background:#c5d8d2;
  border-radius:999px;
}
.wk{
  background:linear-gradient(180deg,#ffffff 0%,#f7fbfa 100%);
  border:1px solid var(--border);
  border-radius:12px;
  padding:11px;
  cursor:pointer;
  transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease,background .2s ease;
  animation:cardIn .38s ease both;
  animation-delay:calc(var(--i) * 18ms);
}
.wk:hover{
  transform:translateY(-2px);
  border-color:#9fbcb5;
  box-shadow:0 14px 26px -24px rgba(16,67,58,.9);
}
.wk.active{
  border-color:var(--border-strong);
  background:linear-gradient(130deg,#effaf7 0%,#fff8ef 100%);
  box-shadow:0 16px 28px -26px rgba(16,67,58,.95);
}
.wk-num{
  font-size:.64rem;
  color:var(--text-tertiary);
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:4px;
}
.wk-title{
  font-size:.84rem;
  font-weight:700;
  color:var(--text-primary);
  line-height:1.32;
}
.wk-meta{
  margin-top:6px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
}
.phase-chip{
  font-size:.64rem;
  padding:3px 8px;
  border-radius:999px;
  font-weight:700;
  letter-spacing:.02em;
}
.wk-total{
  font-size:.66rem;
  color:var(--text-secondary);
}
.wk-badges{
  display:flex;
  gap:4px;
  margin-top:8px;
  flex-wrap:wrap;
}
.badge{
  font-size:.63rem;
  font-weight:700;
  padding:2px 7px;
  border-radius:999px;
  border:1px solid transparent;
}
.badge.e{background:#e8f6df;color:#376714;border-color:#b8d99f}
.badge.m{background:#fff0df;color:#8a4f08;border-color:#f2cc9d}
.badge.h{background:#fde7e7;color:#a52b2b;border-color:#efb4b4}

.detail{
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:1.15rem;
  animation:rise .5s .2s ease both;
}
.detail-head{margin-bottom:.85rem}
.detail-kicker{
  font-size:.68rem;
  color:var(--text-tertiary);
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:5px;
}
.detail-title{
  font-family:"Space Grotesk","Trebuchet MS",sans-serif;
  font-size:1.22rem;
  font-weight:700;
  color:var(--text-primary);
}
.detail-sub{
  font-size:.82rem;
  color:var(--text-secondary);
  margin-top:8px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
}
.meta-pill{
  font-size:.71rem;
  padding:3px 8px;
  border-radius:999px;
  background:var(--bg-muted);
  border:1px solid #dbe8e5;
  color:#3e5851;
}
.session{
  background:linear-gradient(135deg,#f5fbf9 0%,#f9faf4 100%);
  padding:13px 14px;
  margin-bottom:1rem;
  border:1px solid #d7e8e2;
  border-radius:14px;
}
.session h3{
  font-size:.65rem;
  text-transform:uppercase;
  letter-spacing:.09em;
  color:var(--text-tertiary);
  margin-bottom:6px;
}
.session p{
  font-size:.9rem;
  color:var(--text-primary);
  line-height:1.6;
}

.prob-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
  flex-wrap:wrap;
}
.prob-header h3{
  font-size:.7rem;
  text-transform:uppercase;
  letter-spacing:.09em;
  color:var(--text-tertiary);
}
.filters{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.fbtn{
  font-size:.72rem;
  padding:5px 10px;
  border:1px solid #cfdfdb;
  border-radius:999px;
  background:#fff;
  cursor:pointer;
  color:#4a625c;
  font-family:"DM Sans","Segoe UI",sans-serif;
  transition:all .16s ease;
}
.fbtn:hover{border-color:#92b7af;color:#1f4f49}
.fbtn.aa{background:#e9f4f1;color:#104940;border-color:#9ec5bd}
.fbtn.ae{background:#e8f6df;color:#376714;border-color:#9bc078}
.fbtn.am{background:#fff0df;color:#8a4f08;border-color:#e7bd88}
.fbtn.ah{background:#fde7e7;color:#a52b2b;border-color:#e7adad}

.probs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:7px;
}
.prob{
  display:flex;
  align-items:center;
  gap:7px;
  padding:7px 9px;
  border-radius:10px;
  font-size:.83rem;
  border:1px solid var(--border);
  background:linear-gradient(180deg,#ffffff 0%,#fbfefd 100%);
  transition:transform .15s ease,border-color .15s ease;
}
.prob:hover{
  transform:translateX(2px);
  border-color:#aac8c1;
}
.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  flex-shrink:0;
}
.dot.E{background:#639922}
.dot.M{background:#ba7517}
.dot.H{background:#e24b4a}
.prob a{
  color:var(--text-primary);
  text-decoration:none;
  line-height:1.3;
  flex:1;
  font-weight:500;
}
.prob a:hover{
  color:#0d6d65;
  text-decoration:underline;
}
.prob-level{
  font-size:.61rem;
  font-weight:700;
  padding:2px 6px;
  border-radius:999px;
  border:1px solid transparent;
}
.prob-level.E{background:#e8f6df;color:#376714;border-color:#b8d99f}
.prob-level.M{background:#fff0df;color:#8a4f08;border-color:#f2cc9d}
.prob-level.H{background:#fde7e7;color:#a52b2b;border-color:#efb4b4}

@media (max-width:1060px){
  .content-layout{grid-template-columns:1fr}
  .weeks-grid{
    grid-template-columns:1fr 1fr;
    max-height:none;
    overflow:visible;
  }
}
@media (max-width:760px){
  .root{padding:.85rem}
  .header{
    padding:13px 14px;
    align-items:flex-start;
    flex-direction:column;
  }
  .stats-row{grid-template-columns:1fr 1fr}
  .weeks-grid{grid-template-columns:1fr}
  .probs{grid-template-columns:1fr}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation:none !important;
    transition:none !important;
  }
}
@keyframes rise{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(8px) scale(.99)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
</style>

let aw=0, af="all";

function renderGrid(){
  document.getElementById("wg").innerHTML=W.map((w,i)=>{
    const pc=phases[w.ph];
    const cnt={E:0,M:0,H:0};
    w.p.forEach(p=>cnt[p[1]]++);
    return `<div class="wk ${i===aw?'active':''}" style="--i:${i}" onclick="sel(${i})">
      <div class="wk-num">Week ${i+1}</div>
      <div class="wk-title">${w.t}</div>
      <div class="wk-meta">
        <span class="phase-chip" style="background:${pc.bg};color:${pc.c}">${w.ph}</span>
        <span class="wk-total">${w.p.length} problems</span>
      </div>
      <div class="wk-badges">
        <span class="badge e">${cnt.E}E</span>
        <span class="badge m">${cnt.M}M</span>
        <span class="badge h">${cnt.H}H</span>
      </div>
    </div>`;
  }).join("");
}

function renderDetail(){
  const w=W[aw];
  const pc=phases[w.ph];
  const cnt={E:0,M:0,H:0};
  w.p.forEach(p=>cnt[p[1]]++);
  const shown=af==="all"?w.p:w.p.filter(p=>p[1]===af);
  document.getElementById("dp").innerHTML=`
    <div class="detail-head">
      <div class="detail-kicker">Week ${aw+1} / 15</div>
      <div class="detail-title">${w.t}</div>
      <div class="detail-sub">
        <span class="phase-chip" style="background:${pc.bg};color:${pc.c}">${w.ph}</span>
        <span class="meta-pill">${w.p.length} problems</span>
        <span class="meta-pill">${cnt.E} Easy</span>
        <span class="meta-pill">${cnt.M} Medium</span>
        <span class="meta-pill">${cnt.H} Hard</span>
      </div>
    </div>
    <div class="session">
      <h3>2-hour college session</h3>
      <p>${w.s}</p>
    </div>
    <div class="prob-header">
      <h3>Home practice — 50 problems</h3>
      <div class="filters">
        <button class="fbtn ${af==='all'?'aa':''}" onclick="filt('all')">All</button>
        <button class="fbtn ${af==='E'?'ae':''}" onclick="filt('E')">Easy</button>
        <button class="fbtn ${af==='M'?'am':''}" onclick="filt('M')">Med</button>
        <button class="fbtn ${af==='H'?'ah':''}" onclick="filt('H')">Hard</button>
      </div>
    </div>
    <div class="probs">
      ${shown.map(p=>`
        <div class="prob">
          <span class="dot ${p[1]}"></span>
          <a href="${lc(p[0])}" target="_blank" rel="noopener">${p[0]}</a>
          <span class="prob-level ${p[1]}">${p[1]}</span>
        </div>`).join("")}
    </div>`;
}

function sel(i){aw=i;af="all";renderGrid();renderDetail();}
function filt(f){af=f;renderDetail();}

renderGrid();renderDetail();
</script>
